<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pomodoro timer simpel, elegan, dan Notion-like dengan tugas, tema warna, audio loop, dan notifikasi custom."
    />
    <title>Quiet Pomo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="Quiet Pomo">
          <span class="brand-mark" aria-hidden="true">Q</span>
          <span>Quiet Pomo</span>
        </a>
        <nav class="top-actions" aria-label="Aksi utama">
          <button class="icon-button" id="settingsToggle" type="button" title="Buka pengaturan">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <circle cx="12" cy="12" r="3" />
                <path d="M12 2v3" />
                <path d="M12 19v3" />
                <path d="M4.93 4.93l2.12 2.12" />
                <path d="M16.95 16.95l2.12 2.12" />
                <path d="M2 12h3" />
                <path d="M19 12h3" />
                <path d="M4.93 19.07l2.12-2.12" />
                <path d="M16.95 7.05l2.12-2.12" />
              </svg>
            </span>
          </button>
          <button class="icon-button" id="notificationPermission" type="button" title="Aktifkan notifikasi">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="m2 2 20 20" />
                <path d="M10.27 21a2 2 0 0 0 3.46 0" />
                <path d="M7.7 4.7A6 6 0 0 1 18 8c0 1.7.18 3.02.46 4.04" />
                <path d="M17 17H3c0-2 3-2 3-9 0-.55.07-1.08.2-1.58" />
              </svg>
            </span>
          </button>
          <button class="icon-button" id="resetDay" type="button" title="Reset semua data">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M21 12a9 9 0 0 1-15.4 6.4" />
                <path d="M3 12A9 9 0 0 1 18.4 5.6" />
                <path d="M18 2v4h-4" />
                <path d="M6 22v-4h4" />
              </svg>
            </span>
          </button>
        </nav>
      </header>

      <main class="layout">
        <section class="timer-panel" aria-labelledby="timerTitle">
          <div class="mode-tabs" role="tablist" aria-label="Mode timer">
            <button class="mode-tab active" type="button" data-mode="pomodoro" role="tab">Pomodoro</button>
            <button class="mode-tab" type="button" data-mode="shortBreak" role="tab">Short Break</button>
            <button class="mode-tab" type="button" data-mode="longBreak" role="tab">Long Break</button>
          </div>

          <div class="timer-card">
            <p class="eyebrow" id="timerTitle">Working on</p>
            <h1 class="current-task" id="currentTask">Time to focus</h1>
            <div class="timer-display" id="timerDisplay" aria-live="polite">25:00</div>
            <div class="progress-track" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
            <div class="timer-actions">
              <button class="primary-button" id="startPause" type="button">Start</button>
              <button class="ghost-button" id="skipMode" type="button">Skip</button>
              <button class="ghost-button" id="resetTimer" type="button">Reset</button>
            </div>
          </div>

          <div class="stats-row" aria-label="Ringkasan progres">
            <article>
              <strong id="sessionCount">0</strong>
              <span>Sessions</span>
            </article>
            <article>
              <strong id="focusMinutes">0m</strong>
              <span>Focus</span>
            </article>
            <article>
              <strong id="finishEstimate">--:--</strong>
              <span>Finish at</span>
            </article>
          </div>
        </section>
      </main>

      <div class="settings-drawer" id="settingsDrawer" aria-hidden="true">
        <button class="drawer-backdrop" id="drawerBackdrop" type="button" aria-label="Tutup pengaturan"></button>
        <aside class="side-panel" aria-label="Tugas dan pengaturan">
          <div class="drawer-header">
            <div>
              <p class="eyebrow">Workspace</p>
              <h2>Tasks & settings</h2>
            </div>
            <button class="icon-button" id="settingsClose" type="button" title="Tutup pengaturan">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <div class="drawer-content">
            <section class="tasks-section">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Tasks</p>
                  <h2>Today</h2>
                </div>
                <span id="taskSummary">0 left</span>
              </div>

              <form class="task-form" id="taskForm">
                <input id="taskInput" type="text" placeholder="Tulis tugas..." autocomplete="off" />
                <input id="taskEstimate" type="number" min="1" max="20" value="1" aria-label="Estimasi pomodoro" />
                <button type="submit" title="Tambah tugas">+</button>
              </form>

              <div class="task-list" id="taskList" aria-live="polite"></div>
            </section>

            <section class="settings-section">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Settings</p>
                  <h2>Focus setup</h2>
                </div>
              </div>

              <div class="settings-grid">
                <label>
                  <span>Pomodoro</span>
                  <input id="pomodoroDuration" type="number" min="1" max="180" value="25" />
                </label>
                <label>
                  <span>Short break</span>
                  <input id="shortBreakDuration" type="number" min="1" max="90" value="5" />
                </label>
                <label>
                  <span>Long break</span>
                  <input id="longBreakDuration" type="number" min="1" max="120" value="15" />
                </label>
                <label>
                  <span>Long interval</span>
                  <input id="longBreakInterval" type="number" min="2" max="12" value="4" />
                </label>
              </div>

              <div class="toggle-list">
                <label class="switch-row">
                  <span>Auto-start breaks</span>
                  <input id="autoStartBreaks" type="checkbox" />
                </label>
                <label class="switch-row">
                  <span>Auto-start pomodoros</span>
                  <input id="autoStartPomodoros" type="checkbox" />
                </label>
              </div>

              <div class="sound-row">
                <label class="audio-loop-field">
                  <span>Alarm</span>
                  <select id="alarmSound" class="native-audio-select" tabindex="-1" aria-hidden="true">
                    <option value="assets/notification/alarm-beep.mp3">Alarm beep</option>
                    <option value="assets/notification/beeps.mp3">Beeps</option>
                    <option value="assets/notification/bell.wav">Bell</option>
                    <option value="assets/notification/musical1.mp3">Musical 1</option>
                    <option value="assets/notification/musical2.mp3">Musical 2</option>
                    <option value="assets/notification/piano-music.mp3">Piano music</option>
                    <option value="assets/notification/ring-tone.mp3">Ring tone</option>
                    <option value="assets/notification/timer.mp3">Timer</option>
                    <option value="assets/notification/victory.mp3" selected>Victory</option>
                  </select>
                  <div class="audio-select" id="alarmSelect">
                    <button
                      class="audio-select-button"
                      id="alarmSoundButton"
                      type="button"
                      aria-haspopup="listbox"
                      aria-expanded="false"
                    >
                      <span id="alarmSoundLabel">Victory</span>
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m6 9 6 6 6-6" />
                      </svg>
                    </button>
                    <div class="audio-select-menu" id="alarmSoundMenu" role="listbox">
                      <button type="button" role="option" data-value="assets/notification/alarm-beep.mp3">Alarm beep</button>
                      <button type="button" role="option" data-value="assets/notification/beeps.mp3">Beeps</button>
                      <button type="button" role="option" data-value="assets/notification/bell.wav">Bell</button>
                      <button type="button" role="option" data-value="assets/notification/musical1.mp3">Musical 1</button>
                      <button type="button" role="option" data-value="assets/notification/musical2.mp3">Musical 2</button>
                      <button type="button" role="option" data-value="assets/notification/piano-music.mp3">Piano music</button>
                      <button type="button" role="option" data-value="assets/notification/ring-tone.mp3">Ring tone</button>
                      <button type="button" role="option" data-value="assets/notification/timer.mp3">Timer</button>
                      <button type="button" role="option" data-value="assets/notification/victory.mp3">Victory</button>
                    </div>
                  </div>
                </label>
              </div>

              <div class="sound-row">
                <label class="audio-loop-field">
                  <span>Audio loop</span>
                  <select id="ambientSound" class="native-audio-select" tabindex="-1" aria-hidden="true">
                    <option value="">Off</option>
                    <option value="assets/audio/coffee-shop.m4a">Coffee shop</option>
                    <option value="assets/audio/fast-ticking.m4a">Fast ticking</option>
                    <option value="assets/audio/fire-burning.m4a" selected>Fire burning</option>
                    <option value="assets/audio/library.m4a">Library</option>
                    <option value="assets/audio/ocean-shore.m4a">Ocean shore</option>
                    <option value="assets/audio/rain.m4a">Rain</option>
                    <option value="assets/audio/stream.m4a">Stream</option>
                    <option value="assets/audio/ticking.m4a">Ticking</option>
                    <option value="assets/audio/wind-through-trees.m4a">Wind through trees</option>
                    <option value="assets/audio/wind-with-crickets.m4a">Wind with crickets</option>
                  </select>
                  <div class="audio-select" id="ambientSelect">
                    <button
                      class="audio-select-button"
                      id="ambientSoundButton"
                      type="button"
                      aria-haspopup="listbox"
                      aria-expanded="false"
                    >
                      <span id="ambientSoundLabel">Fire burning</span>
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m6 9 6 6 6-6" />
                      </svg>
                    </button>
                    <div class="audio-select-menu" id="ambientSoundMenu" role="listbox">
                      <button type="button" role="option" data-value="">Off</button>
                      <button type="button" role="option" data-value="assets/audio/coffee-shop.m4a">Coffee shop</button>
                      <button type="button" role="option" data-value="assets/audio/fast-ticking.m4a">Fast ticking</button>
                      <button type="button" role="option" data-value="assets/audio/fire-burning.m4a">Fire burning</button>
                      <button type="button" role="option" data-value="assets/audio/library.m4a">Library</button>
                      <button type="button" role="option" data-value="assets/audio/ocean-shore.m4a">Ocean shore</button>
                      <button type="button" role="option" data-value="assets/audio/rain.m4a">Rain</button>
                      <button type="button" role="option" data-value="assets/audio/stream.m4a">Stream</button>
                      <button type="button" role="option" data-value="assets/audio/ticking.m4a">Ticking</button>
                      <button type="button" role="option" data-value="assets/audio/wind-through-trees.m4a">Wind through trees</button>
                      <button type="button" role="option" data-value="assets/audio/wind-with-crickets.m4a">Wind with crickets</button>
                    </div>
                  </div>
                </label>
                <label>
                  <span>Volume audio</span>
                  <input id="ambientVolume" type="range" min="0" max="100" value="45" />
                </label>
              </div>

              <label class="notification-label">
                <span>Notifikasi custom</span>
                <textarea id="notificationText" rows="3">Waktunya berpindah mode. Ambil napas sebentar.</textarea>
              </label>

              <div class="theme-picker" aria-label="Pilih warna background">
                <button class="theme-swatch active" type="button" data-theme="paper" title="Paper"></button>
                <button class="theme-swatch" type="button" data-theme="sage" title="Sage"></button>
                <button class="theme-swatch" type="button" data-theme="clay" title="Clay"></button>
                <button class="theme-swatch" type="button" data-theme="ink" title="Ink"></button>
                <label class="custom-color" title="Warna bebas">
                  <span>Custom</span>
                  <input id="customColor" type="color" value="#ffffff" />
                </label>
              </div>
            </section>
          </div>
        </aside>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
